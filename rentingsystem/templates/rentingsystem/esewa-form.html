
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block page_title %}
User || Esewa form
{% endblock %}

{% block main_content %}
<div class="container">
    <div class="d-flex justify-content-center align-items-center">
        <div class="col-md-5 p-3 mt-4 shadow-lg">
            <h2 class="text-center text-muted">You are being redirected to Esewa Please wait....</h2>

            <div class="card" style="display: none;">
                <form action="https://rc-epay.esewa.com.np/api/epay/main/v2/form" method="POST" id="esewa_form">
                <input type="text" id="amount" name="amount" value="{{data.amount}}" required>
                <input type="text" id="tax_amount" name="tax_amount" value ="0" required>
                <input type="text" id="total_amount" name="total_amount" value="{{data.total_amount}}" required>
                <input type="text" id="transaction_uuid" name="transaction_uuid" value="{{data.transaction_uuid}}" required>
                <input type="text" id="product_code" name="product_code" value ="EPAYTEST" required>
                <input type="text" id="product_service_charge" name="product_service_charge" value="0" required>
                <input type="text" id="product_delivery_charge" name="product_delivery_charge" value="0" required>
                <input type="text" id="success_url" name="success_url" value="http://127.0.0.1:8000/esewa_verify/{{payment.id}}/" required>
                <input type="text" id="failure_url" name="failure_url" value="https://developer.esewa.com.np/failure" required>
                <input type="text" id="signed_field_names" name="signed_field_names" value="total_amount,transaction_uuid,product_code" required>
                <input type="text" id="signature" name="signature" value="{{data.signature}}" required>
                <button type="Submit" >continue to esewa </button>
                <!-- <input value="Submit" type="submit"> -->
                </form>
            </div>

        </div>
    </div>
</div>

<script>
    setTimeout(()=>{
        document.getElementById('esewa_form').submit()
    },1000)
</script>

{% endblock %}

{% extends "base-dashboard.html" %}

{% block main_content %}

<style>
.form-box{
    background:white;
    padding:25px;
    width:420px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.form-group{
    margin-bottom:12px;
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-bottom:5px;
}

input, select, textarea{
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
}

.btn{
    width:100%;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
}

.btn:hover{
    background:#2980b9;
}
</style>

<h2>🚗 Vehicle Form</h2>

<div class="form-box">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            {{ form.name }}
        </div>

        <div class="form-group">
            <label>Category</label>
            {{ form.category }}
        </div>

        <div class="form-group">
            <label>Price per Day</label>
            {{ form.price_per_day }}
        </div>

        <div class="form-group">
            <label>Image</label>
            {{ form.image }}
        </div>

        <div class="form-group">
            <label>Description</label>
            {{ form.description }}
        </div>

        <div class="form-group">
            <label>Availability</label>
            {{ form.is_available }}
        </div>

        <button type="submit" class="btn">Save Vehicle</button>

    </form>

</div>

{% endblock %}

{% extends "base-dashboard.html" %}

{% block main_content %}

<style>
.form-box{
    background:white;
    padding:25px;
    width:420px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.form-group{
    margin-bottom:12px;
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-bottom:5px;
}

input, select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
}

.btn{
    width:100%;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
}

.btn:hover{
    background:#2980b9;
}
</style>

<h2>📅 Create Booking</h2>

<div class="form-box">

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>User</label>
            {{ form.user }}
        </div>

        <div class="form-group">
            <label>Vehicle</label>
            {{ form.vehicle }}
        </div>

        <div class="form-group">
            <label>Start Date</label>
            {{ form.start_date }}
        </div>

        <div class="form-group">
            <label>End Date</label>
            {{ form.end_date }}
        </div>

        <div class="form-group">
            <label>Status</label>
            {{ form.status }}
        </div>

        <button type="submit" class="btn">Create Booking</button>

    </form>

</div>

{% endblock %}
